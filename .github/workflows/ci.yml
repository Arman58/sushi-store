name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sushi_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sushi_e2e
      NEXTAUTH_SECRET: e2e-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      ADMIN_USER: admin
      ADMIN_PASS: e2e-admin-pass
      ADMIN_SESSION_SECRET: e2e-admin-session-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      # seed без dotenv-обёртки: env уже задан на уровне job
      - run: npx ts-node --transpile-only --compiler-options '{"module":"CommonJS","moduleResolution":"node"}' prisma/seed.ts
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Production release: миграции применяются ДО деплоя кода.
  # Авто-деплой main в Vercel отключён (vercel.json → git.deploymentEnabled),
  # сборку запускает Deploy Hook после успешного migrate deploy.
  # Требуемые секреты репозитория:
  #   DATABASE_URL        - прод-база (для prisma migrate deploy)
  #   VERCEL_DEPLOY_HOOK  - URL из Vercel → Settings → Git → Deploy Hooks (ветка main)
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Check secrets are configured
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "::error::Добавьте секреты DATABASE_URL и VERCEL_DEPLOY_HOOK (Settings → Secrets and variables → Actions), иначе прод не задеплоится."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
      - name: Trigger Vercel production deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" > /dev/null && echo "Deploy hook triggered"
